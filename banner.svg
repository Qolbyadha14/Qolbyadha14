<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6E40C9;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6E40C9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6E40C9;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="50" x2="900" y2="50" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="100" x2="900" y2="100" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="150" x2="900" y2="150" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- Grid lines vertical -->
  <line x1="100" y1="0" x2="100" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="500" y1="0" x2="500" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="700" y1="0" x2="700" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="800" y1="0" x2="800" y2="200" stroke="#6E40C9" stroke-width="0.3" stroke-opacity="0.1"/>

  <!-- Animated scanning line -->
  <rect width="900" height="2" fill="url(#lineGrad)" y="0" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,200;0,0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated dots (nodes) -->
  <!-- Node 1 -->
  <circle cx="120" cy="60" r="3" fill="#6E40C9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 2 -->
  <circle cx="240" cy="130" r="3" fill="#9B6BF0" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 3 -->
  <circle cx="380" cy="70" r="3" fill="#6E40C9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 4 -->
  <circle cx="780" cy="80" r="3" fill="#9B6BF0" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 5 -->
  <circle cx="820" cy="150" r="3" fill="#6E40C9" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Circuit connections left side -->
  <line x1="120" y1="60" x2="240" y2="60" stroke="#6E40C9" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="240" y1="60" x2="240" y2="130" stroke="#6E40C9" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="240" y1="130" x2="380" y2="130" stroke="#6E40C9" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="380" y1="130" x2="380" y2="70" stroke="#6E40C9" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Circuit connections right side -->
  <line x1="780" y1="80" x2="820" y2="80" stroke="#9B6BF0" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="820" y1="80" x2="820" y2="150" stroke="#9B6BF0" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Data packet moving along circuit left -->
  <circle cx="0" cy="60" r="2.5" fill="#ffffff" filter="url(#glow)" opacity="0.9">
    <animateMotion dur="3s" repeatCount="indefinite" begin="0s">
      <mpath>
        <path d="M120,60 L240,60 L240,130 L380,130 L380,70"/>
      </mpath>
    </animateMotion>
  </circle>

  <!-- Floating binary (left bg) -->
  <text x="30" y="45" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.25">01101</text>
  <text x="30" y="75" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.2">10010</text>
  <text x="30" y="105" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.25">11001</text>
  <text x="30" y="135" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.2">00110</text>
  <text x="30" y="165" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.25">10101</text>

  <!-- Floating binary (right bg) -->
  <text x="845" y="45" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.25">10110</text>
  <text x="845" y="75" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.2">01001</text>
  <text x="845" y="105" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.25">11010</text>
  <text x="845" y="135" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.2">00111</text>
  <text x="845" y="165" font-family="monospace" font-size="9" fill="#6E40C9" opacity="0.25">10001</text>

  <!-- Main title -->
  <text x="450" y="85" font-family="'Segoe UI', 'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="white" text-anchor="middle" filter="url(#glow)">Qolby Yostra Evant Adha</text>

  <!-- Subtitle with color accent -->
  <text x="450" y="118" font-family="'Segoe UI', 'JetBrains Mono', monospace" font-size="14" font-weight="400" fill="#9B6BF0" text-anchor="middle" letter-spacing="3">
    SENIOR SOFTWARE ENGINEER
  </text>

  <!-- Tags row -->
  <!-- Tag 1 -->
  <rect x="237" y="133" width="90" height="22" rx="11" fill="#6E40C9" fill-opacity="0.2" stroke="#6E40C9" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="282" y="149" font-family="monospace" font-size="10" fill="#9B6BF0" text-anchor="middle">Backend</text>

  <!-- Tag 2 -->
  <rect x="337" y="133" width="90" height="22" rx="11" fill="#6E40C9" fill-opacity="0.2" stroke="#6E40C9" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="382" y="149" font-family="monospace" font-size="10" fill="#9B6BF0" text-anchor="middle">DevOps</text>

  <!-- Tag 3 -->
  <rect x="437" y="133" width="90" height="22" rx="11" fill="#6E40C9" fill-opacity="0.2" stroke="#6E40C9" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="482" y="149" font-family="monospace" font-size="10" fill="#9B6BF0" text-anchor="middle">APIs</text>

  <!-- Tag 4 -->
  <rect x="537" y="133" width="90" height="22" rx="11" fill="#6E40C9" fill-opacity="0.2" stroke="#6E40C9" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="582" y="149" font-family="monospace" font-size="10" fill="#9B6BF0" text-anchor="middle">Microservices</text>

  <!-- Stat left -->
  <text x="90" y="175" font-family="monospace" font-size="11" fill="#6E40C9" text-anchor="middle" opacity="0.8">6+ years</text>

  <!-- Stat right -->
  <text x="810" y="175" font-family="monospace" font-size="11" fill="#6E40C9" text-anchor="middle" opacity="0.8">Jakarta, ID 🇮🇩</text>

  <!-- Bottom pulse line -->
  <line x1="350" y1="185" x2="550" y2="185" stroke="#6E40C9" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="350;300;350" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="550;600;550" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="350" cy="185" r="2" fill="#6E40C9">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="185" r="2" fill="#6E40C9">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
